name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ───────────────────────────────────────────
  # Frontend — Next.js 16 / React 19 (client/)
  # ───────────────────────────────────────────
  frontend:
    name: Frontend (client)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Auction contract — contract/ (soroban-sdk 25)
  # ─────────────────────────────────────────────
  auction-contract:
    name: Auction Contract (zenith-auction)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build wasm contract
        run: cargo build --target wasm32-unknown-unknown --release

  # ─────────────────────────────────────────────
  # NFT contract — contract/nft_contract/nft_auction (soroban-sdk 26)
  # ─────────────────────────────────────────────
  nft-contract:
    name: NFT Contract (nft_mint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contract/nft_contract/nft_auction
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contract/nft_contract/nft_auction -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build wasm contract
        run: cargo build --target wasm32-unknown-unknown --release
